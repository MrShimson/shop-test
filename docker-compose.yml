services:

  app:
    container_name: shop-test-app
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      args:
        - DOCKER_UID_GID=${DOCKER_UID_GID}
        - ENABLE_XDEBUG=${ENABLE_XDEBUG}
        - APP_DIR=${APP_DIR}
    volumes:
      - ./:${APP_DIR}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      mysql_test:
        condition: service_healthy
    networks:
      - shop_test_network
    restart: unless-stopped
    tty: true
    stdin_open: true
    command: ["sleep", "infinity"]

  mysql:
    container_name: shop-test-mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - shop_test_network
    restart: unless-stopped

  mysql_test:
    container_name: shop-test-mysql-test
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_TEST_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_TEST_DATABASE}
      MYSQL_USER: ${DB_TEST_USERNAME}
      MYSQL_PASSWORD: ${DB_TEST_PASSWORD}
    ports:
      - "3307:3306"
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_TEST_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - shop_test_network
    restart: unless-stopped

networks:
  shop_test_network:
    external: true

volumes:
  mysql_data:
    driver: local
